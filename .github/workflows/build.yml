name: BUILD KERNEL NEXT
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Kernel
        uses: tiann/KernelSU-Action@main
        with:
          kernel-version: '6.6'
          ksu-version: 'next'
          additional-kconfig: |
            CONFIG_LOCALVERSION="-Samsung-S24U"
            CONFIG_KSU_SUSFS=y
            CONFIG_SUSFS_SPOOF_PROTO=y
